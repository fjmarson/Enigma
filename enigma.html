<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="reset.css/reset.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&display=swap" rel="stylesheet">
    <title>ENIGMA</title>
</head>

<body>
    <div class="wrapper">
        <div class="container">

            <img class="logo" src="img/Enigma-logo.svg.png" alt="Imagen logo Enigma">

            <label>
                <textarea id="texto" class="texto" rows="4" placeholder="Ingrese el texto aquí"></textarea>
            </label>

            <p class="aclaración">Solo letras minúsculas y sin acentos</p>

            <!-- Botones de Encriptar y Desencriptar -->
            <div class="botones">
                <button class="button-small" onclick="procesar('encriptar')">Encriptar</button>
                <button onclick="procesar('desencriptar')">Desencriptar</button>
            </div>

            <label>
                <textarea id="resultado" class="resultado" rows="4" readonly></textarea>
            </label>

            <div>
                <button id="copyBtn" onclick="copiarResultado()">Copiar</button>
            </div>
        </div>
    </div>

    <footer class="footer">
        2024 | Coded by Marson
    </footer>

    <script src="enigma.js"></script>
</body>

</html>
